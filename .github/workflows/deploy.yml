name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - homolog
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - homolog
          - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref_name }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: react

      - name: Create gh-pages branch
        run: |
          git checkout --orphan gh-pages
          git rm -rf .
          git checkout master -- frontend/dist
          git add frontend/dist
          git commit -m "chore: inicializa branch gh-pages"
          git push origin gh-pages --force

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: frontend/dist
          branch: gh-pages
          folder: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref_name }}

      - name: Show Deployment URLs
        run: |
          echo "Ambiente de Desenvolvimento: https://jistriane.github.io/Ibelieve-Finance/dev"
          echo "Ambiente de Homologação: https://jistriane.github.io/Ibelieve-Finance/homolog"
          echo "Ambiente de Produção: https://jistriane.github.io/Ibelieve-Finance/prod"
          echo "URL do Deploy Atual: https://jistriane.github.io/Ibelieve-Finance/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref_name }}" 