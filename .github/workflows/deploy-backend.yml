# .github/workflows/deploy-backend.yml
name: Deploy Backend to Railway

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - main
      - dev
      - homolog
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Deploy to Railway
        run: |
          cd backend
          railway login --token ${{ secrets.RAILWAY_TOKEN }}
          railway up --service=backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          WS_ENDPOINT: ${{ secrets.WS_ENDPOINT }}
          CHAIN_ID: ${{ secrets.CHAIN_ID }}
          NETWORK_NAME: ${{ secrets.NETWORK_NAME }}
          ACCOUNT_ADDRESS: ${{ secrets.ACCOUNT_ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROOF_REGISTRY_ADDRESS: ${{ secrets.PROOF_REGISTRY_ADDRESS }}
          PORT: ${{ secrets.PORT }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUBWALLET_ENDPOINT: ${{ secrets.SUBWALLET_ENDPOINT }}
          SUBWALLET_APP_NAME: ${{ secrets.SUBWALLET_APP_NAME }}
          SUBWALLET_TOKEN: ${{ secrets.SUBWALLET_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
