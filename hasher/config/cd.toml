[database]
url = "postgres://ibeleve:ibeleve@postgres:5432/ibeleve_cd"

[redis]
url = "redis://redis:6379"

[auth]
jwt_secret = "your_jwt_secret_cd"
jwt_expiration = 3600

[blockchain]
rpc_url = "https://mainnet.infura.io/v3/your_key"
network = "mainnet"

[ai]
model_path = "/app/models"
confidence_threshold = 0.8

[zkp]
verification_key_path = "/app/keys/verification.key"
proving_key_path = "/app/keys/proving.key"

[log]
level = "debug"
backtrace = true

[service]
api_gateway_port = 8080
auth_service_port = 8081
zkp_service_port = 8082
ai_service_port = 8083
blockchain_service_port = 8084
user_service_port = 8085

[cors]
allowed_origins = ["https://cd.ibeleve.com", "https://api-cd.ibeleve.com"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["Content-Type", "Authorization"]

[rate_limit]
requests = 1000
duration = 60

[cache]
ttl = 3600
prefix = "ibeleve_cd_"

[security]
encryption_key = "your_encryption_key_cd"
hash_salt = "your_hash_salt_cd"

[monitoring]
enable_metrics = true
metrics_port = 9090
enable_tracing = true
tracing_service_name = "ibeleve_cd" 