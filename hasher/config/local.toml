[database]
url = "postgres://ibeleve:ibeleve@localhost:5432/ibeleve_local"

[redis]
url = "redis://localhost:6379"

[auth]
jwt_secret = "your_jwt_secret_local"
jwt_expiration = 3600

[blockchain]
rpc_url = "https://mainnet.infura.io/v3/your_key"
network = "mainnet"

[ai]
model_path = "./models"
confidence_threshold = 0.8

[zkp]
verification_key_path = "./keys/verification.key"
proving_key_path = "./keys/proving.key"

[log]
level = "debug"
backtrace = true

[service]
api_gateway_port = 8080
auth_service_port = 8081
zkp_service_port = 8082
ai_service_port = 8083
blockchain_service_port = 8084
user_service_port = 8085

[cors]
allowed_origins = ["http://localhost:3000", "http://localhost:8080"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["Content-Type", "Authorization"]

[rate_limit]
requests = 1000
duration = 60

[cache]
ttl = 3600
prefix = "ibeleve_local_"

[security]
encryption_key = "your_encryption_key_local"
hash_salt = "your_hash_salt_local"

[monitoring]
enable_metrics = true
metrics_port = 9090
enable_tracing = true
tracing_service_name = "ibeleve_local" 